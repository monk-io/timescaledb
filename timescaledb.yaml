namespace: timescaledb

base:
  defines: runnable
  metadata:
    name: TimescaleDB
    description: |
      Reusable TimescaleDB component. It runs the public TimescaleDB PostgreSQL
      image with the TimescaleDB extension created during database initialization.
      Inheriting templates should provide database credentials and may compose this
      with application services that need PostgreSQL-compatible time-series storage.
      Compatible upstream database alternatives for apps expecting plain Postgres
      include the Monk catalog `postgresql/db` package or hosted Postgres packages
      such as Neon; use this component when the TimescaleDB extension is required.
    tags: timescaledb, postgresql, postgres, time-series, database, component
    website: https://www.tigerdata.com/
    source: https://github.com/timescale/timescaledb
    publisher: monk.io
    icon: https://assets-global.website-files.com/646dd1f1a3703e451ba81ecc/649dbd4c8adf2641ff9800c2_timescale-logo.svg
    private: false
  variables:
    image-tag:
      type: string
      value: 2.28.0-pg17
      description: Public timescale/timescaledb Docker image tag to run.
    db-name:
      type: string
      env: POSTGRES_DB
      value: timescaledb
      description: PostgreSQL database created at first initialization.
    db-user:
      type: string
      env: POSTGRES_USER
      value: timescaledb
      description: PostgreSQL user created at first initialization.
    db-password:
      type: string
      env: POSTGRES_PASSWORD
      value: ""
      description: Sensitive PostgreSQL password. Inheriting templates must set a generated value or read secret("timescaledb-db-password") using a plain secret name.
    volume-name:
      type: string
      value: timescaledb-data
      description: Monk volume subdirectory used for persistent PostgreSQL data.
  containers:
    db:
      image: timescale/timescaledb
      image-tag: <- $image-tag
      restart: unless-stopped
      paths:
        - <- `${volume-path}/${volume-name}:/var/lib/postgresql/data`
  files:
    timescaledb-init:
      container: db
      path: /docker-entrypoint-initdb.d/10-timescaledb.sql
      raw: false
      contents: |
        CREATE EXTENSION IF NOT EXISTS timescaledb;

        CREATE TABLE IF NOT EXISTS monk_timescaledb_health (
          time timestamptz NOT NULL,
          value double precision NOT NULL
        );

        SELECT create_hypertable('monk_timescaledb_health', 'time', if_not_exists => TRUE);
        INSERT INTO monk_timescaledb_health (time, value) VALUES (now(), 1.0);
  services:
    postgres:
      container: db
      port: 5432
      protocol: tcp
      publish: false
      description: Private PostgreSQL-compatible TCP endpoint with TimescaleDB extension available.
